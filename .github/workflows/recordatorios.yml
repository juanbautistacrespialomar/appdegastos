name: Recordatorios diarios - Mis Gastos

on:
  schedule:
    - cron: "0 12 * * *"   # 12:00 UTC = 09:00 en Argentina (UTC-3). Ajustá si querés otro horario.
  workflow_dispatch: {}      # te permite probarlo a mano desde la pestaña "Actions" de GitHub

jobs:
  enviar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias
        working-directory: scripts/recordatorios
        run: npm install

      - name: Enviar recordatorios
        working-directory: scripts/recordatorios
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: "mailto:tu-email@ejemplo.com"
        run: node enviar-recordatorios.js
