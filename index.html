<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Mis Gastos</title>
<meta name="theme-color" content="#020617">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mis Gastos">
<link rel="apple-touch-icon" href="Logo.png">
<link rel="manifest" href="manifest.json">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg:#020617; --card:#0f172a; --card2:#1e293b; --border:#1e293b;
    --txt:#f1f5f9; --muted:#64748b; --green:#10b981; --amber:#f59e0b; --sky:#38bdf8; --red:#f87171; --violet:#a855f7;
  }
  html,body { margin:0; background:var(--bg); color:var(--txt); font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; }
  body { padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom); }
  .wrap { max-width:600px; margin:0 auto; padding:16px; }
  .row { display:flex; align-items:center; }
  .between { justify-content:space-between; }
  h1 { font-size:20px; margin:0; }
  .header { gap:8px; margin-bottom:16px; }
  .btn { border:none; border-radius:10px; font:inherit; cursor:pointer; color:var(--txt); }
  .btn-ghost { background:var(--card2); padding:9px 12px; font-size:14px; display:inline-flex; align-items:center; gap:6px; }
  .btn-ghost:active { background:#334155; }
  .monthbar { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:8px 10px; margin-bottom:14px; }
  .monthbar .nav { background:none; border:none; color:var(--txt); font-size:22px; padding:4px 14px; cursor:pointer; line-height:1; }
  .monthbar .label { font-weight:600; }
  .cards { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:12px; }
  .c { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:11px; }
  .c .lab { font-size:11px; color:var(--muted); margin-bottom:4px; }
  .c .val { font-size:15px; font-weight:700; }
  .split { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:14px; }
  .s { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:8px 10px; }
  .s .l { font-size:10px; color:var(--muted); display:flex; align-items:center; gap:4px; }
  .s .v { font-size:13px; font-weight:600; margin-top:2px; }
  .tabs { display:flex; gap:4px; background:var(--card); border:1px solid var(--border); border-radius:12px; padding:4px; margin-bottom:14px; }
  .tab { flex:1; padding:9px 4px; border-radius:9px; text-align:center; font-size:13px; font-weight:500; color:var(--muted); background:none; border:none; cursor:pointer; }
  .tab.active { background:var(--card2); color:#fff; }
  .panel { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px; margin-bottom:12px; }
  .panel .ptitle { font-size:14px; font-weight:600; color:#cbd5e1; margin:0 0 10px; }
  .legend-row { display:flex; align-items:center; justify-content:space-between; font-size:14px; padding:4px 0; }
  .dot { width:12px; height:12px; border-radius:3px; display:inline-block; margin-right:8px; vertical-align:-1px; }
  .item { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:11px 12px; margin-bottom:8px; display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .item .bar { width:4px; align-self:stretch; border-radius:4px; min-height:34px; }
  .item .desc { font-weight:500; display:flex; align-items:center; gap:6px; }
  .item .meta { font-size:12px; color:var(--muted); margin-top:2px; }
  .item .amt { font-weight:600; white-space:nowrap; }
  .sub { margin-left:14px; }
  .fgroup, .fgroup-c, .var-row { cursor:pointer; }
  .var-row:active { border-color:#475569; }
  .del { background:none; border:none; color:#475569; font-size:17px; cursor:pointer; padding:4px; }
  .del:active { color:var(--red); }
  .empty { text-align:center; color:var(--muted); padding:24px 10px; font-size:14px; line-height:1.5; }
  .grouphdr { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; margin:14px 2px 6px; display:flex; justify-content:space-between; }
  .pin { color:var(--amber); } .pct { color:var(--muted); }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .grid .full { grid-column:1/-1; }
  input,select { width:100%; background:var(--card2); border:1px solid #334155; border-radius:10px; padding:10px 11px; color:var(--txt); font:inherit; }
  input:focus,select:focus { outline:none; border-color:var(--green); }
  .btn-add { background:var(--green); padding:11px; font-weight:600; font-size:14px; display:flex; align-items:center; justify-content:center; gap:6px; }
  .btn-add:active { background:#059669; }
  .crow { display:grid; grid-template-columns:1fr 1fr; gap:6px; background:var(--card2); border-radius:10px; padding:8px; margin-bottom:8px; }
  .crow .full { grid-column:1/-1; }
  .crow label { font-size:10px; color:var(--muted); }
  .mini { font-size:11px; padding:7px 8px; }
  .hist { font-size:10px; color:var(--muted); grid-column:1/-1; }
  .foot { text-align:center; font-size:11px; color:#334155; margin-top:22px; }
  .saldo-pos { color:var(--green); } .saldo-neg { color:var(--red); }
  text { font-family:system-ui,sans-serif; }
  .danger { background:#3f1d1d; color:#fca5a5; }
  #fab { position:fixed; right:18px; bottom:22px; width:56px; height:56px; border-radius:50%; background:var(--green); color:#fff; font-size:30px; line-height:54px; text-align:center; border:none; box-shadow:0 6px 20px rgba(0,0,0,.45); cursor:pointer; z-index:50; }
  #fab:active { background:#059669; }
  .modal-bg { position:fixed; inset:0; background:rgba(2,6,23,.7); display:none; align-items:flex-end; justify-content:center; z-index:60; }
  .modal-bg.open { display:flex; }
  .modal { background:var(--card); border:1px solid var(--border); border-radius:16px 16px 0 0; padding:16px; width:100%; max-width:600px; }
  @media(min-width:600px){ .modal-bg{ align-items:center; } .modal{ border-radius:16px; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="row between header">
    <div class="row" style="gap:8px"><span style="font-size:22px">💰</span><h1>Mis Gastos</h1></div>
    <div class="row" style="gap:8px">
      <button class="btn btn-ghost" id="eyeBtn" title="Ocultar/mostrar importes">👁</button>
      <button class="btn btn-ghost" id="exportBtn">⤓ Exportar</button>
    </div>
  </div>

  <div class="row between monthbar">
    <button class="nav" id="prevMonth">‹</button>
    <span class="label" id="monthLabel"></span>
    <button class="nav" id="nextMonth">›</button>
  </div>

  <div class="cards" id="cards"></div>
  <div class="split" id="split"></div>

  <div class="tabs" id="tabs">
    <button class="tab active" data-v="resumen">Resumen</button>
    <button class="tab" data-v="mov">Movim.</button>
    <button class="tab" data-v="cuotas">Cuotas</button>
    <button class="tab" data-v="ajustes">Ajustes</button>
  </div>

  <div id="filtros" style="display:none">
    <div class="grid" style="margin-bottom:14px">
      <input class="full" type="text" id="f-texto" placeholder="🔍 Buscar (ej: nafta)">
      <select id="f-cat"></select>
      <select id="f-medio"></select>
      <button class="btn btn-ghost full" id="f-clear">Limpiar filtros</button>
    </div>
  </div>

  <div id="content"></div>
  <p class="foot">Mis Gastos v5 · tus datos se guardan en este dispositivo.</p>

  <button id="fab" title="Cargar gasto variable">＋</button>

  <div id="modal" class="modal-bg">
    <div class="modal">
      <div class="row between" style="margin-bottom:10px"><strong id="m-title">Nuevo gasto variable</strong><button id="m-close" class="del" style="font-size:20px">✕</button></div>
      <div class="grid">
        <input class="full" type="text" inputmode="decimal" id="q-monto" placeholder="Monto ($)  ej: 1234,50">
        <select id="q-cat"></select>
        <select id="q-medio"></select>
        <input type="date" id="q-fecha">
        <input class="full" type="text" id="q-desc" placeholder="Descripción (opcional)">
        <button class="btn btn-add full" id="q-add">＋ Agregar</button>
      </div>
    </div>
  </div>
</div>

<script>
"use strict";
const CATS = ["Comida","Transporte","Salidas/Comidas","Hogar","Mantenimiento","Servicios","Suscripciones","Salud","Cuidado personal","Ocio","Educación","Ropa","Viajes","Mascotas","Regalos","Gimnasio","Tecnología","Niños","Impuestos","Alquiler","Cuotas","Otros"];
const MEDIOS = ["Efectivo","Débito","Crédito","Transferencia","MercadoPago"];
const TARJETAS = ["Visa","Mastercard","MercadoPago"];
const COLORES = { "Comida":"#22c55e","Transporte":"#3b82f6","Salidas/Comidas":"#f59e0b","Salidas/Asados":"#f59e0b","Hogar":"#fb923c","Mantenimiento":"#ca8a04","Servicios":"#06b6d4","Suscripciones":"#6366f1","Salud":"#ec4899","Cuidado personal":"#f472b6","Ocio":"#fb7185","Educación":"#0ea5e9","Ropa":"#d946ef","Viajes":"#eab308","Mascotas":"#b45309","Regalos":"#f43f5e","Gimnasio":"#84cc16","Tecnología":"#0284c7","Niños":"#fbbf24","Impuestos":"#94a3b8","Alquiler":"#14b8a6","Cuotas":"#a855f7","Otros":"#64748b" };
const MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const MC = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];

function ymNow(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"); }
function tarjetaLabel(f){ return "💳 " + (f==="MercadoPago"?"Mercado Pago":f); }

function SEED() { return { v:3, ingresos:[{n:"Sueldo", hist:[{d:ymNow(), m:0}]}], fijos:[], cuotas:[] }; }
function MOV_SEED() { return []; }

const CKEY="misGastosApp.config.v1", MKEY="misGastosApp.mov.v1";
const mem={};
function load(k,def){ try{const r=localStorage.getItem(k); return r?JSON.parse(r):def;}catch(e){ return (k in mem)?mem[k]:def; } }
function save(k,v){ mem[k]=v; try{localStorage.setItem(k,JSON.stringify(v));}catch(e){} }

function parseMonto(v){ v=String(v).trim(); if(!v) return NaN; if(v.indexOf(",")>=0) v=v.replace(/\./g,"").replace(",","."); return parseFloat(v); }
function migrarCat(c){ return c==="Salidas/Asados" ? "Salidas/Comidas" : c; }

function normConfig(c){
  if(!c||typeof c!=="object") return SEED();
  c.v=3;
  if(!Array.isArray(c.ingresos)){
    c.ingresos=[];
    if(typeof c.sueldo==="number" && c.sueldo>0) c.ingresos.push({n:"Sueldo", hist:[{d:(c.desde||ymNow()), m:c.sueldo}]});
    else c.ingresos.push({n:"Sueldo", hist:[{d:ymNow(), m:0}]});
  }
  delete c.sueldo;
  c.ingresos.forEach(g=>{ if(!Array.isArray(g.hist)) g.hist=[{d:ymNow(), m:(g.m||0)}]; if(!g.n) g.n="Ingreso"; });
  if(!Array.isArray(c.fijos)) c.fijos=[];
  if(!Array.isArray(c.cuotas)) c.cuotas=[];
  c.fijos.forEach(f=>{ if(!f.hist){ f.hist=[{d:(c.desde||ymNow()),m:(f.m||0)}]; delete f.m; } if(!f.cat) f.cat="Otros"; f.cat=migrarCat(f.cat); });
  return c;
}
function normMov(m){ if(!Array.isArray(m)) return []; m.forEach(x=>{ if(!x.medio) x.medio="—"; if(!x.categoria) x.categoria="Otros"; x.categoria=migrarCat(x.categoria); if(typeof x.monto!=="number") x.monto=parseMonto(x.monto)||0; }); return m; }

let config = load(CKEY,null); config = config? normConfig(config) : SEED(); save(CKEY,config);
let mov = load(MKEY,null); mov = (mov===null)? MOV_SEED() : normMov(mov); save(MKEY,mov);
let vista="resumen";
let mesActivo=ymNow();
let colapsado={};
let colCuotas={};
let editId=null;
let oculto=false;
let fTexto="", fCat="__todas", fMedio="__todos";

const $ = id => document.getElementById(id);
const fmt = n => oculto ? "$ •••••" : new Intl.NumberFormat("es-AR",{style:"currency",currency:"ARS",maximumFractionDigits:0}).format(Math.round(n)||0);
const fmtN = n => oculto ? "•••••" : new Intl.NumberFormat("es-AR").format(n);
const hoy = () => new Date().toISOString().slice(0,10);
const nombreMes = ym => { const [y,m]=ym.split("-"); return MESES[+m-1]+" "+y; };
function ymAdd(ym,k){ const [y,m]=ym.split("-").map(Number); const d=new Date(y,m-1+k,1); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"); }
function ymDiff(a,b){ const [ay,am]=a.split("-").map(Number),[by,bm]=b.split("-").map(Number); return (by-ay)*12+(bm-am); }
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function persistC(){ save(CKEY,config); } function persistM(){ save(MKEY,mov); }
function histLabel(d){ return MC[(+d.split("-")[1])-1]+" '"+d.slice(2,4); }

function montoVigente(hist, ym){ let best=null; (hist||[]).forEach(h=>{ if(h.d<=ym && (!best||h.d>best.d)) best=h; }); return best?best.m:0; }
function setVig(obj, desde, monto){ if(!obj.hist) obj.hist=[]; const ex=obj.hist.find(h=>h.d===desde); if(ex) ex.m=monto; else obj.hist.push({d:desde,m:monto}); obj.hist.sort((a,b)=>a.d.localeCompare(b.d)); persistC(); render(); }

function computeMes(ym){
  const ingresos=[]; config.ingresos.forEach(g=>{ const m=montoVigente(g.hist,ym); if(m>0) ingresos.push({nombre:g.n, monto:m}); });
  const ingreso = ingresos.reduce((s,x)=>s+x.monto,0);
  const fijos=[]; config.fijos.forEach(f=>{ const m=montoVigente(f.hist,ym); if(m>0) fijos.push({nombre:f.n, monto:m, cat:f.cat}); });
  const cuotas=[];
  config.cuotas.forEach(q=>{ const k=ymDiff(q.d,ym); if(k>=0 && k<=(q.t-q.c)) cuotas.push({nombre:q.n+" "+(q.c+k)+"/"+q.t, fuente:q.f, monto:q.m}); });
  const variables = mov.filter(x=>x.fecha.slice(0,7)===ym).sort((a,b)=>b.fecha.localeCompare(a.fecha));
  const tF=fijos.reduce((s,x)=>s+x.monto,0), tC=cuotas.reduce((s,x)=>s+x.monto,0), tV=variables.reduce((s,x)=>s+x.monto,0);
  const gasto=tF+tC+tV;
  return {ingresos,ingreso,fijos,cuotas,variables,tF,tC,tV,gasto,saldo:ingreso-gasto};
}

function donut(data,total){
  if(!total) return `<div class="empty">Sin gastos este mes.</div>`;
  const r=70,cx=100,cy=100,C=2*Math.PI*r; let acc=0,segs="";
  data.forEach(d=>{ const len=(d.value/total)*C;
    segs+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${COLORES[d.name]||'#64748b'}" stroke-width="26" stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-acc}"></circle>`; acc+=len; });
  return `<svg viewBox="0 0 200 200" width="100%" height="200" style="max-height:200px"><g transform="rotate(-90 ${cx} ${cy})">${segs}</g>
    <text x="${cx}" y="${cy-4}" text-anchor="middle" fill="#94a3b8" font-size="11">Gasto</text>
    <text x="${cx}" y="${cy+15}" text-anchor="middle" fill="#f1f5f9" font-size="15" font-weight="700">${fmt(total)}</text></svg>`;
}
function proyeccion(){
  const arr=[]; for(let i=0;i<6;i++){ const ym=ymAdd(mesActivo,i); const c=computeMes(ym);
    arr.push({mes:MC[(+ym.split("-")[1])-1], saldo:c.saldo, actual:i===0}); }
  const maxAbs=Math.max(...arr.map(a=>Math.abs(a.saldo)),1);
  const W=330,H=180,pad=26,bw=30,gap=(W-pad*2-bw*6)/5,zero=H/2;
  let bars="";
  arr.forEach((a,i)=>{ const h=(Math.abs(a.saldo)/maxAbs)*(H/2-16); const x=pad+i*(bw+gap);
    const y=a.saldo>=0?zero-h:zero; const col=a.saldo>=0?(a.actual?'#10b981':'#15803d'):'#f87171';
    bars+=`<rect x="${x}" y="${y}" width="${bw}" height="${Math.max(h,1)}" rx="3" fill="${col}"></rect>
      <text x="${x+bw/2}" y="${H-4}" text-anchor="middle" fill="#64748b" font-size="10">${a.mes}</text>`; });
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="180"><line x1="${pad-6}" y1="${zero}" x2="${W-pad+6}" y2="${zero}" stroke="#334155" stroke-width="1"/>${bars}</svg>`;
}

function render(){
  $("monthLabel").textContent = nombreMes(mesActivo);
  $("eyeBtn").textContent = oculto ? "🙈" : "👁";
  $("filtros").style.display = vista==="mov" ? "" : "none";
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.v===vista));
  const c = computeMes(mesActivo);

  $("cards").innerHTML =
    `<div class="c"><div class="lab">Ingresos</div><div class="val" style="color:var(--green)">${fmt(c.ingreso)}</div></div>
     <div class="c"><div class="lab">Gastos</div><div class="val">${fmt(c.gasto)}</div></div>
     <div class="c"><div class="lab">Saldo</div><div class="val ${c.saldo>=0?'saldo-pos':'saldo-neg'}">${fmt(c.saldo)}</div></div>`;
  $("split").innerHTML =
    `<div class="s"><div class="l"><span class="dot" style="background:var(--amber);width:8px;height:8px"></span>Fijos</div><div class="v">${fmt(c.tF)}</div></div>
     <div class="s"><div class="l"><span class="dot" style="background:var(--violet);width:8px;height:8px"></span>Cuotas</div><div class="v">${fmt(c.tC)}</div></div>
     <div class="s"><div class="l"><span class="dot" style="background:var(--sky);width:8px;height:8px"></span>Variables</div><div class="v">${fmt(c.tV)}</div></div>`;

  if(vista==="resumen") renderResumen(c);
  else if(vista==="mov") renderMov(c);
  else if(vista==="cuotas") renderCuotas();
  else renderAjustes();

  $("content").querySelectorAll(".del-mov").forEach(b=>b.onclick=(e)=>{ e.stopPropagation(); if(confirm("¿Borrar este gasto?")){ mov=mov.filter(x=>x.id!==b.dataset.id); persistM(); render(); } });
  $("content").querySelectorAll(".var-row").forEach(el=>el.onclick=(e)=>{ if(e.target.closest(".del")) return; abrirModalEdit(el.dataset.edit); });
  $("content").querySelectorAll(".fgroup").forEach(el=>el.onclick=()=>{ const cat=el.dataset.cat; colapsado[cat] = (colapsado[cat]!==false)? false : true; render(); });
  $("content").querySelectorAll(".fgroup-c").forEach(el=>el.onclick=()=>{ const card=el.dataset.card; colCuotas[card] = (colCuotas[card]===true)? false : true; render(); });
}

function renderResumen(c){
  const map={};
  c.fijos.forEach(f=>map[f.cat]=(map[f.cat]||0)+f.monto);
  if(c.tC>0) map["Cuotas"]=(map["Cuotas"]||0)+c.tC;
  c.variables.forEach(v=>map[v.categoria]=(map[v.categoria]||0)+v.monto);
  const cats=Object.entries(map).map(([name,value])=>({name,value})).sort((a,b)=>b.value-a.value);
  const total=c.gasto;
  const leyenda=cats.map(x=>`<div class="legend-row"><span><span class="dot" style="background:${COLORES[x.name]||'#64748b'}"></span>${x.name}</span>
    <span>${fmt(x.value)} <span class="pct">(${total?((x.value/total)*100).toFixed(0):0}%)</span></span></div>`).join("");
  $("content").innerHTML =
    `<div class="panel"><p class="ptitle">Gastos por categoría</p>${donut(cats,total)}<div style="margin-top:8px">${leyenda||''}</div></div>
     <div class="panel"><p class="ptitle">📈 Saldo proyectado (6 meses)</p>${proyeccion()}
        <p style="font-size:11px;color:var(--muted);margin:6px 0 0">Verde = saldo positivo · Rojo = negativo.</p></div>`;
}

function fila(nombre,meta,monto,color,delId,editId){
  return `<div class="item${editId?' var-row':''}"${editId?` data-edit="${editId}"`:''}><div style="display:flex;align-items:center;gap:10px;min-width:0">
    <span class="bar" style="background:${color}"></span>
    <div style="min-width:0"><div class="desc">${esc(nombre)}</div>${meta?`<div class="meta">${esc(meta)}</div>`:''}</div></div>
    <div style="display:flex;align-items:center;gap:6px"><span class="amt">${fmt(monto)}</span>
    ${delId?`<button class="del del-mov" data-id="${delId}">🗑</button>`:''}</div></div>`;
}
function grupoCuotas(lista){
  const gc={}; lista.forEach(q=>{ (gc[q.fuente]=gc[q.fuente]||[]).push(q); });
  let h="";
  TARJETAS.forEach(f=>{ const items=gc[f]; if(!items||!items.length) return;
    const sub=items.reduce((s,x)=>s+x.monto,0); const col=colCuotas[f]===true;
    h+=`<div class="item fgroup-c" data-card="${f}"><div style="display:flex;align-items:center;gap:10px;min-width:0">
          <span class="bar" style="background:#a855f7"></span>
          <div class="desc">${col?'▸':'▾'} ${tarjetaLabel(f)} <span style="color:var(--muted);font-weight:400">· ${items.length}</span></div></div>
        <span class="amt">${fmt(sub)}</span></div>`;
    if(!col) h+= items.map(q=>`<div class="sub">`+fila(q.nombre, "", q.monto, "#a855f7")+`</div>`).join("");
  });
  // tarjetas que no estén en la lista estándar
  Object.keys(gc).filter(f=>!TARJETAS.includes(f)).forEach(f=>{ const items=gc[f]; const sub=items.reduce((s,x)=>s+x.monto,0); const col=colCuotas[f]===true;
    h+=`<div class="item fgroup-c" data-card="${esc(f)}"><div style="display:flex;align-items:center;gap:10px;min-width:0"><span class="bar" style="background:#a855f7"></span><div class="desc">${col?'▸':'▾'} 💳 ${esc(f)} <span style="color:var(--muted);font-weight:400">· ${items.length}</span></div></div><span class="amt">${fmt(sub)}</span></div>`;
    if(!col) h+= items.map(q=>`<div class="sub">`+fila(q.nombre, "", q.monto, "#a855f7")+`</div>`).join("");
  });
  return h;
}
function renderMov(c){
  let h="";
  const filtroActivo = fTexto.trim()!=="" || fCat!=="__todas" || fMedio!=="__todos";
  if(filtroActivo){
    const q=fTexto.trim().toLowerCase();
    let items=[];
    c.fijos.forEach(f=>items.push({nombre:f.nombre, categoria:f.cat, medio:"", monto:f.monto, tipo:"Fijo", color:COLORES[f.cat]||"#f59e0b"}));
    c.cuotas.forEach(x=>items.push({nombre:x.nombre, categoria:"Cuotas", medio:"", monto:x.monto, tipo:tarjetaLabel(x.fuente).replace("💳 ",""), color:"#a855f7"}));
    c.variables.forEach(v=>items.push({nombre:v.descripcion||v.categoria, categoria:v.categoria, medio:v.medio, monto:v.monto, tipo:"Variable", color:COLORES[v.categoria]||"#64748b", id:v.id, fecha:v.fecha}));
    const res=items.filter(it=>{
      if(fCat!=="__todas" && it.categoria!==fCat) return false;
      if(fMedio!=="__todos" && it.medio!==fMedio) return false;
      if(q && !(it.nombre.toLowerCase().includes(q) || it.categoria.toLowerCase().includes(q))) return false;
      return true;
    });
    const suma=res.reduce((s,x)=>s+x.monto,0);
    h+=`<div class="grouphdr"><span>${res.length} resultado${res.length===1?"":"s"} · ${nombreMes(mesActivo)}</span><span>${fmt(suma)}</span></div>`;
    h+= res.length? res.map(it=>{ const meta = it.tipo==="Variable" ? (it.categoria+" · "+it.medio+" · "+it.fecha.slice(8,10)+"/"+it.fecha.slice(5,7)) : (it.categoria+" · "+it.tipo); return fila(it.nombre, meta, it.monto, it.color, it.id, it.id); }).join("") : `<div class="empty">Sin resultados con esos filtros en este mes.</div>`;
    $("content").innerHTML=h; return;
  }
  if(c.ingresos.length){ h+=`<div class="grouphdr"><span>Ingresos</span><span>${fmt(c.ingreso)}</span></div>`;
    h+= c.ingresos.map(g=>fila(g.nombre,"Ingreso mensual",g.monto,"#10b981")).join(""); }

  h+=`<div class="grouphdr"><span>Gastos fijos</span><span>${fmt(c.tF)}</span></div>`;
  if(!c.fijos.length){ h+=`<div class="empty">Agregá tus gastos fijos desde Ajustes.</div>`; }
  else {
    const grupos={}; c.fijos.forEach(f=>{ (grupos[f.cat]=grupos[f.cat]||[]).push(f); });
    Object.keys(grupos).sort((a,b)=>grupos[b].reduce((s,x)=>s+x.monto,0)-grupos[a].reduce((s,x)=>s+x.monto,0)).forEach(cat=>{
      const items=grupos[cat]; const sub=items.reduce((s,x)=>s+x.monto,0); const col = colapsado[cat]!==false;
      h+=`<div class="item fgroup" data-cat="${esc(cat)}"><div style="display:flex;align-items:center;gap:10px;min-width:0">
            <span class="bar" style="background:${COLORES[cat]||'#64748b'}"></span>
            <div class="desc">${col?'▸':'▾'} ${esc(cat)} <span style="color:var(--muted);font-weight:400">· ${items.length}</span></div></div>
          <span class="amt">${fmt(sub)}</span></div>`;
      if(!col) h+= items.map(f=>`<div class="sub">`+fila(f.nombre, "Fijo mensual", f.monto, COLORES[f.cat]||'#f59e0b')+`</div>`).join("");
    });
  }

  h+=`<div class="grouphdr"><span>Cuotas</span><span>${fmt(c.tC)}</span></div>`;
  h+= c.cuotas.length? grupoCuotas(c.cuotas) : `<div class="empty">Sin cuotas este mes.</div>`;
  h+=`<div class="grouphdr"><span>Variables</span><span>${fmt(c.tV)}</span><span style="text-transform:none;letter-spacing:0">tocá para editar</span></div>`;
  h+= c.variables.length? c.variables.map(v=>fila(v.descripcion||v.categoria, v.categoria+" · "+v.medio+" · "+v.fecha.slice(8,10)+"/"+v.fecha.slice(5,7), v.monto, COLORES[v.categoria]||"#64748b", v.id, v.id)).join("") : `<div class="empty">Tocá el botón "+" para cargar un gasto.</div>`;
  $("content").innerHTML=h;
}

function renderCuotas(){
  function bloque(fuente, etiqueta){
    const items = config.cuotas.filter(q=>q.f===fuente).map(q=>{
      const k=ymDiff(q.d,mesActivo);
      if(k<0 || k>(q.t-q.c)) return null;
      return {q, actual:(q.c+k)+"/"+q.t, rest:(q.t-q.c)-k+1, total:((q.t-q.c)-k+1)*q.m};
    }).filter(Boolean);
    if(!items.length) return "";
    const sub = items.reduce((s,x)=>s+x.total,0);
    const col = colCuotas[fuente]===true;
    let h=`<div class="item fgroup-c" data-card="${fuente}"><div style="display:flex;align-items:center;gap:10px;min-width:0">
        <span class="bar" style="background:#a855f7"></span>
        <div class="desc">${col?'▸':'▾'} ${etiqueta} <span style="color:var(--muted);font-weight:400">· ${items.length}</span></div></div>
      <span class="amt">${fmt(sub)}</span></div>`;
    if(!col) h+= items.map(x=>`<div class="sub">`+fila(x.q.n, "Cuota "+x.actual+` · quedan ${x.rest} ($${fmtN(x.q.m)}/mes)`, x.total, "#a855f7")+`</div>`).join("");
    return h;
  }
  const totalRest = config.cuotas.reduce((s,q)=>{ const k=ymDiff(q.d,mesActivo); if(k<0||k>(q.t-q.c)) return s; return s+((q.t-q.c)-k+1)*q.m; },0);
  const cuerpo = TARJETAS.map(f=>bloque(f, tarjetaLabel(f))).join("");
  $("content").innerHTML =
    `<div class="panel" style="padding:12px 14px"><span style="color:var(--muted);font-size:13px">Total comprometido en cuotas (desde ${nombreMes(mesActivo)})</span>
       <div style="font-size:22px;font-weight:700;color:var(--violet);margin-top:4px">${fmt(totalRest)}</div></div>`
    + (cuerpo || `<div class="empty">No hay cuotas activas en ${nombreMes(mesActivo)}.</div>`);
}

function renderAjustes(){
  const catOpts = sel => CATS.map(c=>`<option ${c===sel?"selected":""}>${c}</option>`).join("");
  const tarjOpts = sel => TARJETAS.map(f=>`<option value="${f}" ${f===sel?"selected":""}>${f==="MercadoPago"?"Mercado Pago":f}</option>`).join("");
  const ingRows = config.ingresos.map((g,i)=>{
    const m=montoVigente(g.hist,mesActivo);
    const histTxt=(g.hist&&g.hist.length>1)?`<div class="hist">Historial: ${g.hist.map(h=>histLabel(h.d)+": $"+fmtN(h.m)).join(" · ")}</div>`:"";
    return `<div class="crow">
      <div class="full"><label>Nombre del ingreso</label><input class="mini" data-t="ingreso" data-i="${i}" data-k="n" value="${esc(g.n)}"></div>
      <div><label>$ por mes (en ${histLabel(mesActivo)})</label><input class="mini" type="text" inputmode="decimal" data-imonto="${i}" value="${m}"></div>
      <div style="display:flex;gap:6px;align-items:flex-end"><div style="flex:1"><label>Aplicar desde</label><input class="mini" type="month" data-idesde="${i}" value="${mesActivo}"></div>
        <button class="del" data-t="deling" data-i="${i}">🗑</button></div>
      ${histTxt}</div>`;
  }).join("");
  const fijosRows = config.fijos.map((f,i)=>{
    const montoActual = montoVigente(f.hist, mesActivo);
    const histTxt = (f.hist&&f.hist.length>1)? `<div class="hist">Historial: ${f.hist.map(h=>histLabel(h.d)+": $"+fmtN(h.m)).join(" · ")}</div>` : "";
    return `<div class="crow">
      <div class="full"><label>Gasto fijo</label><input class="mini" data-t="fijo" data-i="${i}" data-k="n" value="${esc(f.n)}"></div>
      <div><label>Categoría</label><select class="mini" data-t="fijo" data-i="${i}" data-k="cat">${catOpts(f.cat)}</select></div>
      <div><label>$ por mes (en ${histLabel(mesActivo)})</label><input class="mini" type="text" inputmode="decimal" data-fmonto="${i}" value="${montoActual}"></div>
      <div class="full" style="display:flex;gap:6px;align-items:center"><label style="flex:1">Aplicar cambio desde</label>
        <input class="mini" type="month" style="width:140px" data-fdesde="${i}" value="${mesActivo}">
        <button class="del" data-t="delfijo" data-i="${i}">🗑</button></div>
      ${histTxt}</div>`;
  }).join("");
  const cuotaRows = config.cuotas.map((q,i)=>`<div class="crow">
      <div class="full"><label>Detalle</label><input class="mini" data-t="cuota" data-i="${i}" data-k="n" value="${esc(q.n)}"></div>
      <div><label>Tarjeta</label><select class="mini" data-t="cuota" data-i="${i}" data-k="f">${tarjOpts(q.f)}</select></div>
      <div><label>$ por cuota</label><input class="mini" type="text" inputmode="decimal" data-t="cuota" data-i="${i}" data-k="m" value="${q.m}"></div>
      <div><label>Cuota en ${histLabel(q.d)}</label><input class="mini" type="number" data-t="cuota" data-i="${i}" data-k="c" value="${q.c}"></div>
      <div><label>Total cuotas</label><input class="mini" type="number" data-t="cuota" data-i="${i}" data-k="t" value="${q.t}"></div>
      <div class="full" style="display:flex;gap:6px;align-items:center"><label style="flex:1">Mes 1ª cuota</label>
        <input class="mini" type="month" style="width:140px" data-t="cuota" data-i="${i}" data-k="d" value="${q.d}">
        <button class="del" data-t="delcuota" data-i="${i}">🗑</button></div></div>`).join("");

  $("content").innerHTML =
    `<div class="panel"><p class="ptitle">💵 Ingresos</p>${ingRows}
       <button class="btn btn-ghost" id="add-ing" style="margin-top:4px">＋ Agregar ingreso</button></div>
     <div class="panel"><p class="ptitle">📌 Gastos fijos (precio con vigencia)</p>${fijosRows||'<div class="empty" style="padding:8px">Todavía no cargaste fijos.</div>'}
       <button class="btn btn-ghost" id="add-fijo" style="margin-top:4px">＋ Agregar fijo</button></div>
     <div class="panel"><p class="ptitle">💳 Cuotas</p>${cuotaRows||'<div class="empty" style="padding:8px">Todavía no cargaste cuotas.</div>'}
       <button class="btn btn-ghost" id="add-cuota" style="margin-top:4px">＋ Agregar cuota</button></div>
     <div class="panel"><p class="ptitle">⚙️ Datos y backup</p>
       <button class="btn btn-ghost" id="backup" style="margin-bottom:8px">⬇️ Descargar backup (todo)</button>
       <button class="btn btn-ghost" id="importBtn" style="margin-bottom:8px">⬆️ Restaurar desde backup</button>
       <input type="file" id="importFile" accept="application/json,.json" style="display:none">
       <button class="btn btn-ghost danger" id="reset">↺ Borrar todo y empezar de cero</button>
       <p style="font-size:11px;color:var(--muted);margin:8px 0 0">El backup guarda TODO en un archivo. Hacelo cada tanto, por las dudas.</p></div>`;

  $("content").querySelectorAll("[data-t='ingreso'],[data-t='fijo'],[data-t='cuota']").forEach(el=>{
    el.onchange = ()=>{ const i=+el.dataset.i,k=el.dataset.k,t=el.dataset.t;
      let val = (el.inputMode==="decimal")? (parseMonto(el.value)||0) : (el.type==="number"? (parseFloat(el.value)||0) : el.value);
      if(t==="ingreso") config.ingresos[i][k]=val; else if(t==="fijo") config.fijos[i][k]=val; else config.cuotas[i][k]=val;
      persistC(); render(); };
  });
  $("content").querySelectorAll("[data-imonto]").forEach(el=>{
    el.onchange=()=>{ const i=+el.dataset.imonto; const dEl=$("content").querySelector("[data-idesde='"+i+"']");
      setVig(config.ingresos[i], (dEl&&dEl.value)||mesActivo, parseMonto(el.value)||0); };
  });
  $("content").querySelectorAll("[data-fmonto]").forEach(el=>{
    el.onchange = ()=>{ const i=+el.dataset.fmonto; const dEl=$("content").querySelector("[data-fdesde='"+i+"']");
      setVig(config.fijos[i], (dEl&&dEl.value)||mesActivo, parseMonto(el.value)||0); };
  });
  $("content").querySelectorAll("[data-t='deling']").forEach(b=>b.onclick=()=>{ config.ingresos.splice(+b.dataset.i,1); persistC(); render(); });
  $("content").querySelectorAll("[data-t='delfijo']").forEach(b=>b.onclick=()=>{ config.fijos.splice(+b.dataset.i,1); persistC(); render(); });
  $("content").querySelectorAll("[data-t='delcuota']").forEach(b=>b.onclick=()=>{ config.cuotas.splice(+b.dataset.i,1); persistC(); render(); });
  $("add-ing").onclick=()=>{ config.ingresos.push({n:"Nuevo ingreso",hist:[{d:mesActivo,m:0}]}); persistC(); render(); };
  $("add-fijo").onclick=()=>{ config.fijos.push({n:"Nuevo fijo",cat:"Servicios",hist:[{d:mesActivo,m:0}]}); persistC(); render(); };
  $("add-cuota").onclick=()=>{ config.cuotas.push({n:"Nueva compra",f:"Visa",c:1,t:6,m:0,d:mesActivo}); persistC(); render(); };
  $("reset").onclick=()=>{ if(confirm("¿Borrar TODOS tus datos y empezar de cero?")){ config=SEED(); mov=MOV_SEED(); persistC(); persistM(); mesActivo=ymNow(); render(); } };
  $("backup").onclick=()=>{
    const data={ app:"MisGastos", fecha:new Date().toISOString(), config, mov };
    const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:"application/json"}));
    a.download="backup_misgastos_"+hoy()+".json"; a.click(); URL.revokeObjectURL(a.href);
  };
  $("importBtn").onclick=()=>$("importFile").click();
  $("importFile").onchange=(e)=>{
    const file=e.target.files[0]; if(!file) return;
    const r=new FileReader();
    r.onload=()=>{ try{ const d=JSON.parse(r.result);
        if(!d.config||!Array.isArray(d.mov)) throw new Error("formato");
        if(confirm("Esto va a reemplazar TODOS los datos actuales por los del backup. ¿Seguir?")){
          config=normConfig(d.config); mov=normMov(d.mov); persistC(); persistM(); render(); alert("Backup restaurado ✓");
        }
      }catch(err){ alert("No pude leer el archivo. ¿Es un backup válido?"); }
      e.target.value=""; };
    r.readAsText(file);
  };
}

function abrirModalAlta(){
  editId=null; $("m-title").textContent="Nuevo gasto variable";
  $("q-monto").value=""; $("q-desc").value=""; $("q-cat").selectedIndex=0; $("q-medio").selectedIndex=0; $("q-fecha").value=hoy();
  $("q-add").textContent="＋ Agregar";
  $("modal").classList.add("open"); $("q-monto").focus();
}
function abrirModalEdit(id){
  const v=mov.find(x=>x.id===id); if(!v) return;
  editId=id; $("m-title").textContent="Editar gasto";
  $("q-monto").value=v.monto;
  $("q-cat").value=v.categoria;
  const ms=$("q-medio"); if(![...ms.options].some(o=>o.value===v.medio)) ms.add(new Option(v.medio, v.medio)); ms.value=v.medio;
  $("q-fecha").value=v.fecha; $("q-desc").value=v.descripcion||"";
  $("q-add").textContent="✓ Guardar cambios";
  $("modal").classList.add("open"); $("q-monto").focus();
}
function cerrarModal(){ $("modal").classList.remove("open"); editId=null; }

function exportar(){
  const c=computeMes(mesActivo), sep=";", L=[];
  L.push(["Tipo","Detalle","Categoría/Tarjeta","Monto"].join(sep));
  c.ingresos.forEach(g=>L.push(["Ingreso",'"'+g.nombre+'"',"",g.monto].join(sep)));
  c.fijos.forEach(f=>L.push(["Fijo",'"'+f.nombre+'"',f.cat,f.monto].join(sep)));
  c.cuotas.forEach(q=>L.push(["Cuota",'"'+q.nombre+'"',q.fuente,q.monto].join(sep)));
  c.variables.forEach(v=>L.push(["Variable",'"'+(v.descripcion||"").replace(/"/g,'""')+'"',v.categoria,v.monto].join(sep)));
  L.push(["","TOTAL GASTOS","",c.gasto].join(sep));
  L.push(["","SALDO","",c.saldo].join(sep));
  const csv="\uFEFF"+L.join("\r\n");
  const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8"}));
  a.download="gastos_"+mesActivo+".csv"; a.click(); URL.revokeObjectURL(a.href);
}

$("prevMonth").onclick=()=>{ mesActivo=ymAdd(mesActivo,-1); render(); };
$("nextMonth").onclick=()=>{ mesActivo=ymAdd(mesActivo,1); render(); };
$("exportBtn").onclick=exportar;
$("eyeBtn").onclick=()=>{ oculto=!oculto; render(); };
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{ vista=t.dataset.v; render(); });

$("q-cat").innerHTML = CATS.map(c=>`<option>${c}</option>`).join("");
$("q-medio").innerHTML = MEDIOS.map(m=>`<option>${m}</option>`).join("");
$("f-cat").innerHTML = `<option value="__todas">Todas las categorías</option>` + CATS.map(c=>`<option value="${c}">${c}</option>`).join("");
$("f-medio").innerHTML = `<option value="__todos">Todos los medios</option>` + MEDIOS.map(m=>`<option value="${m}">${m}</option>`).join("");
$("f-texto").oninput=()=>{ fTexto=$("f-texto").value; render(); };
$("f-cat").onchange=()=>{ fCat=$("f-cat").value; render(); };
$("f-medio").onchange=()=>{ fMedio=$("f-medio").value; render(); };
$("f-clear").onclick=()=>{ fTexto=""; fCat="__todas"; fMedio="__todos"; $("f-texto").value=""; $("f-cat").value="__todas"; $("f-medio").value="__todos"; render(); };
$("fab").onclick=abrirModalAlta;
$("m-close").onclick=cerrarModal;
$("modal").onclick=e=>{ if(e.target.id==="modal") cerrarModal(); };
$("q-monto").addEventListener("keydown",e=>{ if(e.key==="Enter") $("q-add").click(); });
$("q-desc").addEventListener("keydown",e=>{ if(e.key==="Enter") $("q-add").click(); });
$("q-add").onclick=()=>{
  const monto=parseMonto($("q-monto").value);
  if(!monto||monto<=0){ $("q-monto").focus(); return; }
  if(editId){
    const v=mov.find(x=>x.id===editId);
    if(v){ v.monto=monto; v.categoria=$("q-cat").value; v.medio=$("q-medio").value; v.fecha=$("q-fecha").value||hoy(); v.descripcion=$("q-desc").value.trim(); }
  } else {
    mov.unshift({id:Date.now()+"_"+Math.random().toString(36).slice(2,6), monto, categoria:$("q-cat").value, fecha:$("q-fecha").value||hoy(), descripcion:$("q-desc").value.trim(), medio:$("q-medio").value});
  }
  persistM(); cerrarModal(); vista="mov"; render();
};

render();
